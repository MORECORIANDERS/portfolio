<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="EVA 风格演示文稿界面">
  <defs>
    <radialGradient id="eva-glow-green" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#76FF03" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#76FF03" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eva-glow-purple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#745694" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#745694" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eva-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#745694"/>
      <stop offset="1" stop-color="#76FF03"/>
    </linearGradient>
  </defs>

  <!-- 深空背景 -->
  <rect width="1600" height="1000" fill="#0a0a12"/>

  <!-- 光晕 -->
  <circle cx="1380" cy="120" r="420" fill="url(#eva-glow-green)"/>
  <circle cx="180" cy="880" r="360" fill="url(#eva-glow-purple)"/>

  <!-- 粒子层（散射点） -->
  <g fill="#76FF03">
    <circle cx="120" cy="200" r="1.5" opacity="0.7"/>
    <circle cx="280" cy="140" r="1" opacity="0.5"/>
    <circle cx="440" cy="220" r="1.8" opacity="0.8"/>
    <circle cx="640" cy="120" r="1.2" opacity="0.6"/>
    <circle cx="860" cy="180" r="1.5" opacity="0.7"/>
    <circle cx="1080" cy="240" r="1" opacity="0.5"/>
    <circle cx="1320" cy="160" r="1.6" opacity="0.7"/>
    <circle cx="1500" cy="220" r="1.2" opacity="0.6"/>
    <circle cx="80" cy="420" r="1.4" opacity="0.6"/>
    <circle cx="240" cy="500" r="1" opacity="0.5"/>
    <circle cx="1520" cy="540" r="1.6" opacity="0.7"/>
    <circle cx="1440" cy="660" r="1.2" opacity="0.6"/>
    <circle cx="60" cy="760" r="1.5" opacity="0.7"/>
    <circle cx="220" cy="820" r="1" opacity="0.5"/>
    <circle cx="1480" cy="880" r="1.4" opacity="0.6"/>
  </g>
  <g fill="#745694">
    <circle cx="360" cy="320" r="1.6" opacity="0.7"/>
    <circle cx="560" cy="380" r="1.2" opacity="0.5"/>
    <circle cx="780" cy="340" r="1.4" opacity="0.6"/>
    <circle cx="1000" cy="400" r="1.8" opacity="0.8"/>
    <circle cx="1240" cy="360" r="1.2" opacity="0.5"/>
    <circle cx="180" cy="640" r="1.5" opacity="0.6"/>
    <circle cx="400" cy="720" r="1" opacity="0.5"/>
    <circle cx="620" cy="680" r="1.6" opacity="0.7"/>
    <circle cx="840" cy="760" r="1.2" opacity="0.5"/>
    <circle cx="1100" cy="720" r="1.4" opacity="0.6"/>
    <circle cx="1300" cy="800" r="1.8" opacity="0.8"/>
  </g>

  <!-- 顶部紫绿渐变条 -->
  <rect x="0" y="0" width="1600" height="4" fill="url(#eva-bar)"/>

  <!-- 演示主区域：左侧封面卡 + 右侧对比卡 -->
  <!-- 左：封面页样例 -->
  <g transform="translate(80,120)">
    <rect width="680" height="760" rx="10" fill="#14142b" fill-opacity="0.85" stroke="#76FF03" stroke-opacity="0.18" stroke-width="1"/>
    <text x="340" y="150" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" letter-spacing="4" fill="#76FF03" opacity="0.7">EVA PRESENTATION</text>
    <text x="340" y="280" text-anchor="middle" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="52" font-weight="900" fill="#ffffff">EVA 演示生成器</text>
    <text x="340" y="330" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="20" fill="#888888">文字 → 单文件 HTML 演示</text>
    <!-- 三张小卡 -->
    <g transform="translate(110,400)">
      <rect width="140" height="90" rx="6" fill="#76FF03" fill-opacity="0.06" stroke="#76FF03" stroke-opacity="0.3"/>
      <text x="70" y="40" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#76FF03">5</text>
      <text x="70" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#888888">配色方案</text>
    </g>
    <g transform="translate(270,400)">
      <rect width="140" height="90" rx="6" fill="#76FF03" fill-opacity="0.06" stroke="#76FF03" stroke-opacity="0.3"/>
      <text x="70" y="40" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#76FF03">6+</text>
      <text x="70" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#888888">页面布局</text>
    </g>
    <g transform="translate(430,400)">
      <rect width="140" height="90" rx="6" fill="#76FF03" fill-opacity="0.06" stroke="#76FF03" stroke-opacity="0.3"/>
      <text x="70" y="40" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#76FF03">1</text>
      <text x="70" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#888888">单文件输出</text>
    </g>
    <!-- 页码 -->
    <text x="630" y="700" text-anchor="end" font-family="'Courier New',monospace" font-size="44" font-weight="900" fill="#76FF03" opacity="0.06">01</text>
    <!-- 导航点 -->
    <g transform="translate(300,560)">
      <circle cx="0" cy="0" r="6" fill="#76FF03"/>
      <circle cx="22" cy="0" r="6" fill="#76FF03" fill-opacity="0.2" stroke="#76FF03" stroke-opacity="0.3"/>
      <circle cx="44" cy="0" r="6" fill="#76FF03" fill-opacity="0.2" stroke="#76FF03" stroke-opacity="0.3"/>
      <circle cx="66" cy="0" r="6" fill="#76FF03" fill-opacity="0.2" stroke="#76FF03" stroke-opacity="0.3"/>
    </g>
  </g>

  <!-- 右：对比布局样例 -->
  <g transform="translate(820,120)">
    <rect width="700" height="760" rx="10" fill="#14142b" fill-opacity="0.85" stroke="#76FF03" stroke-opacity="0.18" stroke-width="1"/>
    <!-- tag -->
    <rect x="40" y="40" width="100" height="24" rx="3" fill="#76FF03" fill-opacity="0.08" stroke="#76FF03" stroke-opacity="0.3"/>
    <text x="90" y="56" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" letter-spacing="2" fill="#76FF03">方案对比</text>
    <!-- 标题 -->
    <text x="40" y="110" font-family="'Segoe UI','PingFang SC',sans-serif" font-size="34" font-weight="800" fill="#ffffff">两种方案，<tspan fill="#76FF03">核心差异</tspan></text>
    <!-- 对比双栏 -->
    <g transform="translate(40,150)">
      <!-- 左栏 -->
      <rect width="300" height="340" rx="8" fill="#0a0a12" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="20" y="38" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#e0e0e0">方案 A</text>
      <line x1="20" y1="56" x2="280" y2="56" stroke="#ffffff" stroke-opacity="0.06"/>
      <g font-family="'Segoe UI',sans-serif" font-size="13">
        <text x="20" y="86" fill="#888888">存储</text><text x="90" y="86" fill="#e0e0e0">本地文件</text>
        <text x="20" y="116" fill="#888888">协作</text><text x="90" y="116" fill="#e0e0e0">单人</text>
        <text x="20" y="146" fill="#888888">搜索</text><text x="90" y="146" fill="#e0e0e0">本地全文</text>
        <text x="20" y="176" fill="#888888">接入</text><text x="90" y="176" fill="#e0e0e0">手动配置</text>
      </g>
      <!-- 右栏（推荐） -->
      <g transform="translate(320,0)">
        <rect width="300" height="340" rx="8" fill="#76FF03" fill-opacity="0.04" stroke="#76FF03" stroke-opacity="0.25"/>
        <text x="20" y="38" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#ffffff">方案 B</text>
        <rect x="180" y="20" width="100" height="22" rx="3" fill="#76FF03" fill-opacity="0.15" stroke="#76FF03" stroke-opacity="0.3"/>
        <text x="230" y="35" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#76FF03">RECOMMENDED</text>
        <line x1="20" y1="56" x2="280" y2="56" stroke="#ffffff" stroke-opacity="0.06"/>
        <g font-family="'Segoe UI',sans-serif" font-size="13">
          <text x="20" y="86" fill="#888888">存储</text><text x="90" y="86" fill="#ffffff">云端 API</text>
          <text x="20" y="116" fill="#888888">协作</text><text x="90" y="116" fill="#ffffff">实时多人</text>
          <text x="20" y="146" fill="#888888">搜索</text><text x="90" y="146" fill="#ffffff">API 精准</text>
          <text x="20" y="176" fill="#888888">接入</text><text x="90" y="176" fill="#ffffff">原生支持</text>
        </g>
      </g>
    </g>
    <!-- 高亮框 -->
    <rect x="40" y="540" width="620" height="70" rx="0 6px 6px 0" fill="#76FF03" fill-opacity="0.08" stroke="#76FF03" stroke-width="0 0 0 3"/>
    <text x="60" y="572" font-family="'Segoe UI',sans-serif" font-size="15" fill="#ffffff">单文件 HTML 输出，拖进浏览器即可播放，分享零成本。</text>
    <text x="60" y="595" font-family="'Courier New',monospace" font-size="11" fill="#76FF03" opacity="0.8">// v2.4.0 · 16 demos</text>
    <!-- 页码 -->
    <text x="650" y="700" text-anchor="end" font-family="'Courier New',monospace" font-size="44" font-weight="900" fill="#76FF03" opacity="0.06">02</text>
  </g>
</svg>
