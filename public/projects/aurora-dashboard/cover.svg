<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="Aurora 实时数据看板">
  <defs>
    <linearGradient id="aur-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e25"/>
      <stop offset="1" stop-color="#121216"/>
    </linearGradient>
    <linearGradient id="aur-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B89366" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#B89366" stop-opacity="0"/>
    </linearGradient>
    <pattern id="aur-grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#aur-bg)"/>
  <rect width="1600" height="1000" fill="url(#aur-grid)"/>

  <!-- 顶部标题条 -->
  <g transform="translate(120,90)">
    <circle cx="0" cy="0" r="6" fill="#B89366"/>
    <rect x="22" y="-8" width="180" height="16" rx="8" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="1240" y="-8" width="120" height="16" rx="8" fill="#ffffff" fill-opacity="0.05"/>
  </g>
  <line x1="120" y1="130" x2="1480" y2="130" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- KPI 卡片 -->
  <g transform="translate(120,170)">
    <g>
      <rect width="300" height="120" rx="6" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="24" y="26" width="90" height="12" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="24" y="56" width="150" height="34" rx="6" fill="#B89366" fill-opacity="0.85"/>
      <rect x="24" y="98" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <g transform="translate(340,0)">
      <rect width="300" height="120" rx="6" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="24" y="26" width="90" height="12" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="24" y="56" width="120" height="34" rx="6" fill="#ffffff" fill-opacity="0.5"/>
      <rect x="24" y="98" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <g transform="translate(680,0)">
      <rect width="300" height="120" rx="6" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="24" y="26" width="90" height="12" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="24" y="56" width="170" height="34" rx="6" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="24" y="98" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
    <g transform="translate(1020,0)">
      <rect width="240" height="120" rx="6" fill="#ffffff" fill-opacity="0.025" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="24" y="26" width="90" height="12" rx="6" fill="#ffffff" fill-opacity="0.18"/>
      <rect x="24" y="56" width="100" height="34" rx="6" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="24" y="98" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.12"/>
    </g>
  </g>

  <!-- 主图表 -->
  <g>
    <path d="M120,820 L120,640 L260,560 L400,600 L540,480 L680,520 L820,400 L960,440 L1100,320 L1240,360 L1380,260 L1480,300 L1480,820 Z" fill="url(#aur-area)"/>
    <path d="M120,640 L260,560 L400,600 L540,480 L680,520 L820,400 L960,440 L1100,320 L1240,360 L1380,260 L1480,300" fill="none" stroke="#C9A06A" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="1380" cy="260" r="7" fill="#C9A06A"/>
    <circle cx="1380" cy="260" r="13" fill="none" stroke="#C9A06A" stroke-opacity="0.4"/>
  </g>

  <!-- 底部柱状 -->
  <g transform="translate(120,860)">
    <g fill="#B89366" fill-opacity="0.55">
      <rect x="0" y="-30" width="26" height="30" rx="2"/>
      <rect x="44" y="-50" width="26" height="50" rx="2"/>
      <rect x="88" y="-20" width="26" height="20" rx="2"/>
      <rect x="132" y="-70" width="26" height="70" rx="2"/>
      <rect x="176" y="-40" width="26" height="40" rx="2"/>
      <rect x="220" y="-90" width="26" height="90" rx="2"/>
      <rect x="264" y="-55" width="26" height="55" rx="2"/>
      <rect x="308" y="-35" width="26" height="35" rx="2"/>
    </g>
    <g fill="#ffffff" fill-opacity="0.22">
      <rect x="1180" y="-60" width="160" height="10" rx="5"/>
      <rect x="1180" y="-40" width="120" height="10" rx="5"/>
      <rect x="1180" y="-20" width="140" height="10" rx="5"/>
    </g>
  </g>
</svg>
