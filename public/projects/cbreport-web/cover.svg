<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="可转债日报界面">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8f5ef"/>
      <stop offset="1" stop-color="#efebe3"/>
    </linearGradient>
    <linearGradient id="cb-up" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9A7B4F" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#9A7B4F" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#cb-bg)"/>

  <!-- 顶部标题条 -->
  <g transform="translate(80,70)">
    <rect x="0" y="0" width="10" height="40" fill="#9A7B4F"/>
    <rect x="26" y="2" width="280" height="16" rx="4" fill="#1C1B19" fill-opacity="0.8"/>
    <rect x="26" y="24" width="180" height="10" rx="3" fill="#1C1B19" fill-opacity="0.25"/>
    <g transform="translate(1180,8)" fill="#1C1B19" fill-opacity="0.12">
      <rect x="0" y="0" width="160" height="14" rx="7"/>
      <rect x="180" y="0" width="100" height="14" rx="7"/>
    </g>
  </g>
  <line x1="80" y1="140" x2="1520" y2="140" stroke="#1C1B19" stroke-opacity="0.1"/>

  <!-- 左侧：市场概况 KPI -->
  <g transform="translate(80,180)">
    <rect x="0" y="0" width="430" height="240" rx="4" fill="#ffffff" fill-opacity="0.5" stroke="#1C1B19" stroke-opacity="0.08"/>
    <rect x="24" y="22" width="120" height="12" rx="3" fill="#1C1B19" fill-opacity="0.3"/>
    <!-- 上涨/下跌 -->
    <g transform="translate(24,60)">
      <text x="0" y="40" font-family="Georgia, serif" font-size="56" fill="#9A7B4F" font-weight="500">157</text>
      <rect x="0" y="56" width="50" height="10" rx="3" fill="#1C1B19" fill-opacity="0.18"/>
      <text x="120" y="40" font-family="Georgia, serif" font-size="56" fill="#6b655c" font-weight="500">147</text>
      <rect x="120" y="56" width="50" height="10" rx="3" fill="#1C1B19" fill-opacity="0.18"/>
    </g>
    <!-- 小指标 -->
    <g transform="translate(24,150)" fill="#1C1B19" fill-opacity="0.5">
      <rect x="0" y="0" width="80" height="8" rx="3"/>
      <rect x="0" y="20" width="60" height="6" rx="3"/>
      <rect x="220" y="0" width="80" height="8" rx="3"/>
      <rect x="220" y="20" width="60" height="6" rx="3"/>
    </g>
  </g>

  <!-- 中部：柱状图（价格分布） -->
  <g transform="translate(540,180)">
    <rect x="0" y="0" width="560" height="240" rx="4" fill="#ffffff" fill-opacity="0.5" stroke="#1C1B19" stroke-opacity="0.08"/>
    <rect x="24" y="22" width="140" height="12" rx="3" fill="#1C1B19" fill-opacity="0.3"/>
    <g transform="translate(40,80)">
      <rect x="0"   y="100" width="40" height="40"  fill="#9A7B4F" fill-opacity="0.3"/>
      <rect x="56"  y="92"  width="40" height="48"  fill="#9A7B4F" fill-opacity="0.35"/>
      <rect x="112" y="60"  width="40" height="80"  fill="#9A7B4F" fill-opacity="0.5"/>
      <rect x="168" y="40"  width="40" height="100" fill="#9A7B4F" fill-opacity="0.65"/>
      <rect x="224" y="55"  width="40" height="85"  fill="#9A7B4F" fill-opacity="0.55"/>
      <rect x="280" y="78"  width="40" height="62"  fill="#9A7B4F" fill-opacity="0.45"/>
      <rect x="336" y="88"  width="40" height="52"  fill="#9A7B4F" fill-opacity="0.4"/>
      <rect x="392" y="96"  width="40" height="44"  fill="#9A7B4F" fill-opacity="0.35"/>
      <rect x="448" y="70"  width="40" height="70"  fill="#9A7B4F" fill-opacity="0.5"/>
    </g>
    <line x1="40" y1="180" x2="520" y2="180" stroke="#1C1B19" stroke-opacity="0.15"/>
  </g>

  <!-- 右侧：榜单表格 -->
  <g transform="translate(1130,180)">
    <rect x="0" y="0" width="390" height="240" rx="4" fill="#1C1B19"/>
    <rect x="24" y="22" width="120" height="12" rx="3" fill="#B89366" fill-opacity="0.8"/>
    <g transform="translate(24,56)" fill="#ECE7DE" fill-opacity="0.7">
      <rect x="0" y="0" width="200" height="9" rx="3"/>
      <rect x="250" y="0" width="100" height="9" rx="3" fill="#B89366"/>
      <rect x="0" y="22" width="180" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
      <rect x="250" y="22" width="80" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
      <rect x="0" y="42" width="210" height="9" rx="3"/>
      <rect x="250" y="42" width="90" height="9" rx="3" fill="#B89366"/>
      <rect x="0" y="64" width="170" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
      <rect x="250" y="64" width="70" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
      <rect x="0" y="86" width="195" height="9" rx="3"/>
      <rect x="250" y="86" width="85" height="9" rx="3" fill="#B89366"/>
      <rect x="0" y="108" width="160" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
      <rect x="250" y="108" width="75" height="8" rx="3" fill="#ECE7DE" fill-opacity="0.45"/>
    </g>
  </g>

  <!-- 底部：折线（市场温度） -->
  <g transform="translate(80,480)">
    <rect x="0" y="0" width="1440" height="430" rx="4" fill="#ffffff" fill-opacity="0.4" stroke="#1C1B19" stroke-opacity="0.08"/>
    <rect x="28" y="24" width="180" height="14" rx="3" fill="#1C1B19" fill-opacity="0.3"/>
    <rect x="28" y="46" width="120" height="9" rx="3" fill="#1C1B19" fill-opacity="0.18"/>
    <path d="M60,360 L180,300 L300,330 L420,250 L540,280 L660,200 L780,240 L900,160 L1020,210 L1140,140 L1260,190 L1380,110 L1380,400 L60,400 Z" fill="url(#cb-up)"/>
    <path d="M60,360 L180,300 L300,330 L420,250 L540,280 L660,200 L780,240 L900,160 L1020,210 L1140,140 L1260,190 L1380,110" fill="none" stroke="#9A7B4F" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="1380" cy="110" r="6" fill="#9A7B4F"/>
    <circle cx="1380" cy="110" r="12" fill="none" stroke="#9A7B4F" stroke-opacity="0.4"/>
    <!-- 横轴刻度 -->
    <g transform="translate(60,420)" fill="#1C1B19" fill-opacity="0.25">
      <rect x="0" y="0" width="6" height="6" rx="1"/>
      <rect x="200" y="0" width="6" height="6" rx="1"/>
      <rect x="400" y="0" width="6" height="6" rx="1"/>
      <rect x="600" y="0" width="6" height="6" rx="1"/>
      <rect x="800" y="0" width="6" height="6" rx="1"/>
      <rect x="1000" y="0" width="6" height="6" rx="1"/>
      <rect x="1200" y="0" width="6" height="6" rx="1"/>
    </g>
  </g>
</svg>
